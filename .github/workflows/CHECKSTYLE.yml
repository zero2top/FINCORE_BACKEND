name: Checkstyle

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Checkstyle
        id: checkstyle
        run: |
          ./gradlew checkstyleMain 2>&1 | tee checkstyle-output.txt
          exit ${PIPESTATUS[0]}
      - name: Comment on failure
        if: failure()
        run: |
          ERROR=$(grep -o '[^ ]*\.java:[0-9]*: error:.*' checkstyle-output.txt | head -5 | sed 's/\/home\/runner\/work\/FINCORE_BACKEND\/FINCORE_BACKEND\///' | tr '\n' '\n')
          gh pr comment ${{ github.event.pull_request.number }} --body "❌ Checkstyle 실패!
          $ERROR"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}